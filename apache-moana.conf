# Simpan file ini di: /etc/apache2/sites-available/moana.conf
# Lalu jalankan perintah berikut di server:
#
# 1. Generate self-signed SSL certificate:
#    sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#      -keyout /etc/ssl/private/moana.key \
#      -out /etc/ssl/certs/moana.crt \
#      -subj "/CN=123.231.138.58" \
#      -addext "subjectAltName=IP:123.231.138.58"
#
# 2. Aktifkan module Apache:
#    sudo a2enmod ssl proxy proxy_http headers
#
# 3. Aktifkan site & reload:
#    sudo a2ensite moana.conf && sudo systemctl reload apache2
 
<VirtualHost *:8080>
    ServerName 123.231.138.58
 
    # ── SSL ────────────────────────────────────────────────
    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/moana.crt
    SSLCertificateKeyFile /etc/ssl/private/moana.key
 
    # Modern SSL only
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        HIGH:!aNULL:!MD5
 
    # ── Reverse Proxy ke Nginx Docker ─────────────────────
    ProxyPreserveHost On
    ProxyRequests Off
 
    ProxyPass        / http://127.0.0.1:8888/
    ProxyPassReverse / http://127.0.0.1:8888/
 
    # Beritahu Django bahwa request aslinya HTTPS
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
 
    # ── Logging ────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/moana_error.log
    CustomLog ${APACHE_LOG_DIR}/moana_access.log combined
</VirtualHost>
 