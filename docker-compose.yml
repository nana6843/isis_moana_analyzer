version: '3.9'

services:
  django:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    restart: unless-stopped
    networks:
      - moana_net

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "127.0.0.1:8888:80"   # Apache akan proxy ke port ini
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - django
    restart: unless-stopped
    networks:
      - moana_net

volumes:
  static_volume:
  media_volume:

networks:
  moana_net:
    driver: bridge